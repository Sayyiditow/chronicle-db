plugins {
    id 'java-library'
    id 'maven-publish'
    id 'application'
}

ext {
    tinyLogVersion  = '2.7.0'
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    api('net.openhft:chronicle-map:2026.1') {
        exclude group: 'com.thoughtworks.xstream', module: 'xstream'
    }
    api 'com.jsoniter:jsoniter:0.9.23'
    api "org.tinylog:tinylog-impl:$tinyLogVersion"
    api "org.tinylog:tinylog-api:$tinyLogVersion"
    implementation 'org.apache.fory:fory-core:0.15.0'
    implementation('net.openhft:chronicle-queue:2026.1') {
        exclude group: 'org.xerial.snappy', module: 'snappy-java'
    }
    implementation 'org.mapdb:mapdb:3.1.0'
    runtimeOnly "org.tinylog:slf4j-tinylog:$tinyLogVersion"
    testImplementation 'org.apache.logging.log4j:log4j-1.2-api:2.23.1'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:6.0.2'
    testImplementation 'org.junit.jupiter:junit-jupiter:6.0.2'
}

application {
    mainClass = 'chronicle.db.Server'
    applicationDefaultJvmArgs = [
                "--add-exports=java.base/jdk.internal.ref=ALL-UNNAMED",
                "--add-exports=java.base/sun.nio.ch=ALL-UNNAMED",
                "--add-exports=jdk.unsupported/sun.misc=ALL-UNNAMED",
                "--add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED",
                "--add-opens=jdk.compiler/com.sun.tools.javac=ALL-UNNAMED",
                "--add-opens=java.base/java.lang=ALL-UNNAMED",
                "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED",
                "--add-opens=java.base/java.io=ALL-UNNAMED",
                "--add-opens=java.base/java.util=ALL-UNNAMED",
                "--add-exports=java.base/jdk.internal.util=ALL-UNNAMED",
                "--enable-native-access=ALL-UNNAMED",
                "--sun-misc-unsafe-memory-access=allow"
                ]
}

group = 'chronicle.db'
version = '0.0.1-RELEASE'
description = 'chronicle-db'

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.release = 25
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

task copyDependencies(type: Copy) {
    from(configurations.runtimeClasspath)
    into("build/libs")
}

build.dependsOn(copyDependencies)

run {
    classpath += files('src/main/resources')
}

distZip.enabled = false
startScripts.enabled = false
distTar.enabled = false

// --- CRITICAL DATA INTEGRITY CHECK ---
task verifyHashSeeds {
    description = 'Ensures that the hashing seeds in ChronicleUtils.java have not been modified.'
    group = 'verification'
    
    doLast {
        def utilsFile = file('src/main/java/chronicle/db/utils/ChronicleUtils.java')
        if (!utilsFile.exists()) {
            throw new RuntimeException("Could not find ChronicleUtils.java for integrity check!")
        }
        
        def content = utilsFile.text
        // We use a literal check to ensure even the 'L' suffix and spacing are preserved as a safeguard
        boolean seed1Ok = content.contains('private static final long hashSeed1 = 0L;')
        boolean seed2Ok = content.contains('private static final long hashSeed2 = 1L;')
        
        if (!seed1Ok || !seed2Ok) {
            throw new RuntimeException(
                "\n" +
                "********************************************************************************\n" +
                "CRITICAL ERROR: Hashing seeds in ChronicleUtils.java have been altered!\n" +
                "Changing these seeds will invalidate all existing KeyMaps and Secondary Indexes,\n" +
                "effectively corrupting the database routing layer.\n" +
                "\n" +
                "Please REVERT hashSeed1 to 0L and hashSeed2 to 1L immediately.\n" +
                "********************************************************************************"
            )
        }
        println "✅ Hashing seed integrity verified."
    }
}

// Hook it into the standard build lifecycle
compileJava.dependsOn verifyHashSeeds